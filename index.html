<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подготовка к ОГЭ по информатике</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1a1a1e;
            --editor-bg: #0f0f11;
            --text-color: #e2e8f0;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --error-color: #ef4444;
            --success-color: #10b981;
            --hint-color: #f59e0b;
            --oge-color: #a855f7;
            --oge-bg: #23153c;
            --border-color: #27272a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 20px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%; max-width: 900px;
        }

        .header {
            text-align: center; margin-bottom: 20px;
            padding: 20px; background: var(--oge-bg);
            border: 1px solid var(--oge-color); border-radius: 12px;
        }

        .header h1 { margin: 0; color: var(--oge-color); font-size: 24px; }

        /* Панель поиска */
        .search-bar {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .search-bar input { flex: 1; }

        .search-results {
            background: var(--panel-bg); border: 1px solid var(--accent-color);
            border-radius: 12px; padding: 15px; margin-bottom: 20px;
            max-height: 200px; overflow-y: auto; display: none;
        }
        .search-results h4 { margin-top: 0; margin-bottom: 10px; color: var(--accent-color); }
        .search-result-item {
            padding: 10px; border-bottom: 1px solid var(--border-color); cursor: pointer;
            transition: background 0.2s; border-radius: 6px;
        }
        .search-result-item:hover { background: #27272a; }
        .search-result-item:last-child { border-bottom: none; }

        /* Панель основных тем ОГЭ (1-10) */
        .topics-bar {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;
            justify-content: center;
        }

        .topic-btn {
            background: var(--panel-bg); color: var(--text-color);
            border: 1px solid var(--border-color); padding: 10px 14px;
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s;
        }

        .topic-btn:hover { border-color: var(--accent-color); }
        .topic-btn.active { background: var(--accent-color); border-color: var(--accent-color); }

        /* Улучшенная панель подномеров (скроллбар) */
        .variants-container {
            background: #1a1a1e; border: 1px solid var(--border-color);
            border-radius: 12px; padding: 15px; margin-bottom: 25px;
        }
        .variants-bar {
            display: flex; flex-wrap: wrap; gap: 8px;
            justify-content: flex-start;
            max-height: 130px; /* Ограничиваем высоту */
            overflow-y: auto;  /* Включаем прокрутку */
            padding-right: 10px;
        }
        
        /* Стилизация скроллбара */
        .variants-bar::-webkit-scrollbar, .search-results::-webkit-scrollbar { width: 8px; }
        .variants-bar::-webkit-scrollbar-track, .search-results::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        .variants-bar::-webkit-scrollbar-thumb, .search-results::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        .variants-bar::-webkit-scrollbar-thumb:hover, .search-results::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

        .variant-btn {
            background: #27272a; color: var(--text-color);
            border: 1px solid transparent; padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s;
            flex: 0 0 auto;
        }

        .variant-btn:hover { border-color: var(--oge-color); }
        .variant-btn.active { 
            background: var(--oge-bg); 
            color: var(--oge-color); 
            border-color: var(--oge-color); 
        }

        /* Карточка задачи */
        .task-card {
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 30px; margin-bottom: 20px;
        }

        .task-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px;
        }

        .task-num {
            background: var(--oge-bg); color: var(--oge-color);
            padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 14px;
        }

        .topic-title { font-size: 16px; color: #94a3b8; font-weight: 500; }

        .task-text { font-size: 18px; line-height: 1.6; margin-bottom: 25px; }
        .task-text b { color: #fff; }

        .task-img {
            max-width: 100%; height: auto; border-radius: 8px;
            margin-bottom: 20px; border: 1px solid var(--border-color);
        }

        /* Поле ввода */
        .input-field {
            background: var(--editor-bg); border: 1px solid var(--border-color);
            color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; outline: none;
        }
        .input-field:focus { border-color: var(--accent-color); }

        .answer-block {
            display: flex; gap: 12px; margin-bottom: 20px; max-width: 400px;
        }
        .answer-block .input-field { flex: 1; }

        .btn {
            padding: 12px 20px; border-radius: 8px; border: none; font-weight: 600;
            cursor: pointer; transition: background 0.2s; font-size: 15px;
        }
        .btn-primary { background: var(--accent-color); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: #27272a; color: var(--text-color); }
        .btn-secondary:hover { background: #3f3f46; }

        /* Сообщения */
        .result-msg {
            padding: 12px; border-radius: 8px; font-weight: 500; margin-bottom: 20px; display: none;
        }
        .success { background: #064e3b; color: #10b981; border: 1px solid #10b981; }
        .error { background: #7f1d1d; color: #ef4444; border: 1px solid #ef4444; }
        .hint { background: #78350f; color: #f59e0b; border: 1px solid #f59e0b; }

        .nav-actions { 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            gap: 10px;
            align-items: center;
            width: 100%;
        }
        .btn-left { justify-self: start; }
        .btn-center { justify-self: center; }
        .btn-right { justify-self: end; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Тренажёр подготовки к ОГЭ по информатике</h1>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" class="input-field" placeholder="Найти задание по ответу (например: 710 или пустые)...">
        <button class="btn btn-primary" onclick="searchTask()">🔍 Найти</button>
    </div>
    
    <div id="searchResults" class="search-results"></div>

    <div class="topics-bar" id="topicsBar"></div>

    <div class="variants-container">
        <div class="variants-bar" id="variantsBar"></div>
    </div>

    <div class="task-card" id="taskCard" style="display:none;">
        <div class="task-header">
            <span class="topic-title" id="topicTitle">Тема</span>
            <span class="task-num" id="taskNum">Задание 1.1</span>
        </div>

        <img id="taskImage" class="task-img" src="" alt="Иллюстрация к заданию" style="display:none;">
        <div class="task-text" id="taskText">Текст задания загружается...</div>

        <div class="answer-block">
            <input type="text" id="userAnswer" class="input-field" placeholder="Введите ответ...">
            <button class="btn btn-primary" onclick="checkAnswer()">Проверить</button>
        </div>

        <div id="resultMsg" class="result-msg"></div>

        <div class="nav-actions">
            <button class="btn btn-secondary btn-left" onclick="navigateTask(-1)">⬅ Назад</button>
            <button class="btn btn-secondary btn-center" onclick="showAnswer()">💡 Показать ответ</button>
            <button class="btn btn-secondary btn-right" onclick="navigateTask(1)">Вперед ➡</button>
        </div>
    </div>
    
    <div id="errorCard" class="task-card" style="text-align:center; color:var(--error-color); display:none;">
        <h3>Ошибка загрузки базы данных!</h3>
        <p>Убедитесь, что файл <b>tasks.js</b> находится в той же папке и не содержит синтаксических ошибок.</p>
    </div>
</div>

<script src="tasks.js"></script>

<script>
    let currentTopic = 1;
    let currentVariantIndex = 0;

    function initSite() {
        if (typeof database === 'undefined') {
            document.getElementById('errorCard').style.display = 'block';
            return;
        }
        
        // Поиск при нажатии Enter
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchTask();
            }
        });

        // Генерируем кнопки основных тем
        const bar = document.getElementById('topicsBar');
        for (let i = 1; i <= 10; i++) {
            if (database[i]) {
                const btn = document.createElement('button');
                btn.className = `topic-btn ${i === 1 ? 'active' : ''}`;
                btn.innerText = `№ ${i}`;
                btn.id = `btn-topic-${i}`;
                btn.onclick = () => selectTopic(i);
                bar.appendChild(btn);
            }
        }
        
        document.getElementById('taskCard').style.display = 'block';
        selectTopic(1); 
    }

    // Поиск задания по ответу
    function searchTask() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const resultsBox = document.getElementById('searchResults');
        
        if (!query) {
            resultsBox.style.display = 'none';
            return;
        }

        let found = [];
        
        for (let topicId in database) {
            if (!database[topicId].variants) continue;
            database[topicId].variants.forEach((task, index) => {
                const ans = task.answer.toString().trim().toLowerCase();
                // Ищем точное совпадение или частичное, если это слово
                if (ans === query) {
                    found.push({ topicId: parseInt(topicId), index, title: database[topicId].title });
                }
            });
        }

        if (found.length > 0) {
            resultsBox.innerHTML = `<h4>Найдено заданий с ответом «${query}»: ${found.length}</h4>`;
            found.forEach(item => {
                const div = document.createElement('div');
                div.className = 'search-result-item';
                div.innerHTML = `Перейти к <b>Заданию ${item.topicId}.${item.index + 1}</b> <span style="color:#94a3b8; font-size:14px;">(${item.title})</span>`;
                div.onclick = () => {
                    selectTopic(item.topicId);
                    currentVariantIndex = item.index;
                    loadTask(currentTopic, currentVariantIndex);
                    resultsBox.style.display = 'none'; // Скрываем результаты после клика
                    document.getElementById('searchInput').value = ''; // Очищаем поле поиска
                };
                resultsBox.appendChild(div);
            });
        } else {
            resultsBox.innerHTML = `<p style="margin:0; color:var(--error-color);">Заданий с таким ответом не найдено.</p>`;
        }
        resultsBox.style.display = 'block';
    }

    function selectTopic(topicId) {
        document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-topic-${topicId}`);
        if (activeBtn) activeBtn.classList.add('active');

        currentTopic = topicId;
        currentVariantIndex = 0;

        renderVariantButtons(topicId);
        loadTask(currentTopic, currentVariantIndex);
    }

    function renderVariantButtons(topicId) {
        const container = document.getElementById('variantsBar');
        container.innerHTML = ''; 

        const topic = database[topicId];
        if (!topic || !topic.variants) return;

        topic.variants.forEach((variant, index) => {
            const btn = document.createElement('button');
            btn.className = 'variant-btn';
            btn.innerText = `${topicId}.${index + 1}`;
            btn.id = `btn-variant-${index}`;
            btn.onclick = () => {
                currentVariantIndex = index;
                loadTask(currentTopic, currentVariantIndex);
            };
            container.appendChild(btn);
        });
    }

    function loadTask(topicId, variantIndex) {
        const topic = database[topicId];
        if (!topic || !topic.variants || topic.variants.length === 0) {
            document.getElementById('taskText').innerHTML = "В этой теме пока нет доступных задач.";
            document.getElementById('taskNum').innerText = `№ ${topicId}`;
            return;
        }

        const task = topic.variants[variantIndex];
        
        document.getElementById('taskNum').innerText = `Задание ${topicId}.${variantIndex + 1}`;
        document.getElementById('topicTitle').innerText = topic.title;
        document.getElementById('taskText').innerHTML = task.text;

        const img = document.getElementById('taskImage');
        if (task.image) {
            img.src = task.image;
            img.style.display = 'block';
        } else {
            img.style.display = 'none';
        }

        document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
        const activeVarBtn = document.getElementById(`btn-variant-${variantIndex}`);
        if (activeVarBtn) {
            activeVarBtn.classList.add('active');
            // Автоматическая прокрутка скроллбара к активной кнопке
            activeVarBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        document.getElementById('userAnswer').value = '';
        document.getElementById('resultMsg').style.display = 'none';
    }

    function checkAnswer() {
        const userAns = document.getElementById('userAnswer').value.trim().toLowerCase();
        const correctAns = database[currentTopic].variants[currentVariantIndex].answer.toString().trim().toLowerCase();
        const msg = document.getElementById('resultMsg');
        
        msg.style.display = 'block';
        if (userAns === correctAns) {
            msg.innerText = "Правильно! Отличный результат. ✅";
            msg.className = "result-msg success";
        } else {
            msg.innerText = "Неверно. Проверьте свои расчеты. ❌";
            msg.className = "result-msg error";
        }
    }

    function showAnswer() {
        const correctAns = database[currentTopic].variants[currentVariantIndex].answer;
        const msg = document.getElementById('resultMsg');
        msg.style.display = 'block';
        msg.innerHTML = `Правильный ответ: <b>${correctAns}</b> 💡`;
        msg.className = "result-msg hint";
    }

    function navigateTask(direction) {
        const topic = database[currentTopic];
        if (!topic || !topic.variants) return;

        if (currentVariantIndex + direction >= 0 && currentVariantIndex + direction < topic.variants.length) {
            currentVariantIndex += direction;
            loadTask(currentTopic, currentVariantIndex);
        } else {
            let nextTopic = currentTopic + direction;
            if (database[nextTopic]) {
                currentTopic = nextTopic;
                currentVariantIndex = direction === -1 ? database[nextTopic].variants.length - 1 : 0;
                
                document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
                const activeBtn = document.getElementById(`btn-topic-${nextTopic}`);
                if (activeBtn) activeBtn.classList.add('active');
                
                renderVariantButtons(nextTopic);
                loadTask(currentTopic, currentVariantIndex);
            }
        }
    }

    window.onload = initSite;
</script>
</body>
</html>
